name: PR Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-pr-${{ github.event.pull_request.number }}
          path: dist/
          retention-days: 3

  cloudflare-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy:preview

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const body = `### Cloudflare Pages Preview

            Build and preview deployment completed for commit \`${{ github.sha }}\`.

            Check the [Cloudflare Pages dashboard](https://dash.cloudflare.com) for the preview URL.

            | Check | Status |
            |---|---|
            | Build | ✅ Passed |
            | Preview deploy | ${{ steps.deploy.outcome == 'success' && '✅ Deployed' || '❌ Failed (CLOUDFLARE_API_TOKEN may not be set)' }} |
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
